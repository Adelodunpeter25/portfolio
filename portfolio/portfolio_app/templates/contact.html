{% extends 'base.html' %}

{% block title %}Contact - My Portfolio{% endblock %}

{% block contact_section %}
<style>
    .contact {
        background-color: var(--light-color);
        padding: 80px 0;
        min-height: 80vh;
    }

    .contact-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 50px;
        align-items: start;
    }

    .contact-info h3 {
        font-size: 2rem;
        margin-bottom: 30px;
        color: var(--dark-color);
    }

    .contact-item {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        padding: 15px;
        background-color: var(--light-color);
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        transition: var(--transition);
    }

    [data-theme="dark"] .contact-item {
        box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
    }

    .contact-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] .contact-item:hover {
        box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
    }

    .contact-item i {
        font-size: 1.5rem;
        color: var(--primary-color);
        margin-right: 15px;
        width: 30px;
    }

    .contact-form {
        background-color: var(--light-color);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: var(--transition);
    }

    [data-theme="dark"] .contact-form {
        background-color: var(--dark-color);
        box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
    }

    .contact-form h3 {
        font-size: 2rem;
        margin-bottom: 30px;
        color: var(--text-color);
        text-align: center;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: var(--text-color);
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 1rem;
        transition: var(--transition);
        background-color: var(--light-color);
        color: var(--text-color);
    }

    [data-theme="dark"] .form-group input,
    [data-theme="dark"] .form-group textarea {
        border-color: #374151;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 120px;
    }

    .submit-btn {
        background-color: var(--primary-color);
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
    }

    .submit-btn:hover {
        background-color: var(--secondary-color);
        transform: translateY(-2px);
    }

    .section-title {
        text-align: center;
        margin-bottom: 50px;
    }

    .section-title h2 {
        font-size: 2.5rem;
        color: var(--dark-color);
        margin-bottom: 15px;
        position: relative;
        display: inline-block;
    }

    .section-title h2::after {
        content: '';
        position: absolute;
        width: 50%;
        height: 3px;
        background-color: var(--primary-color);
        bottom: -10px;
        left: 25%;
    }

    @media (max-width: 768px) {
        .contact-content {
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .contact-form {
            padding: 30px 20px;
        }
    }
</style>

<section id="contact" class="contact">
    <div class="container">
        <div class="section-title">
            <h2>Get In Touch</h2>
        </div>
        <div class="contact-content">
            <div class="contact-info">
                <h3>Let's Connect</h3>
                <div class="contact-item">
                    <i class="fas fa-envelope" aria-label="Email"></i>
                    <div>
                        <h4>Email</h4>
                        <p>adelodunpeter69@gmail.com</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone" aria-label="Phone"></i>
                    <div>
                        <h4>Phone</h4>
                        <p>+2347039201122</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt" aria-label="Location"></i>
                    <div>
                        <h4>Location</h4>
                        <p>Lagos, Nigeria</p>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fab fa-linkedin" aria-label="LinkedIn"></i>
                    <div>
                        <h4>LinkedIn</h4>
                        <p><a href="https://www.linkedin.com/in/adelodun-peter-155321374/" target="_blank">View Profile</a></p>
                    </div>
                </div>
            </div>
            <div class="contact-form">
                <h3>Send Message</h3>
                <form action="contact/contact/form_submission" method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
               
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
