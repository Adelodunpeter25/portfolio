 {% extends 'base.html' %}

{% block title %}Form Submission - My Portfolio{% endblock %}

{% block form_submission %}
<style>
    .submission-confirmation {
        max-width: 500px;
        max-height: fit-content;
        margin: 150px auto;
        padding: 40px;
        background-color: var(--light-color);
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(7, 49, 141, 0.2);
        text-align: center;
        transition: all 0.3s ease;
    }

    .submission-confirmation h1 {
        font-size: 2.1rem;
        color: var(--text-color);
        margin-bottom: 20px;
    }

    .submission-confirmation p {
        font-size: 1.2rem;
        color: var(--text-color);
        margin-bottom: 30px;
    }

    .submission-confirmation button {
        display: inline-block;
        background-color: var(--dark-color);
        color: var(--light-color);
        padding: 12px 30px;
        border-radius: 15px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
    }

    .submission-confirmation button:hover {
        background-color: var(--primary-color);
    }

    @media (max-width: 770px) {
        .submission-confirmation {
            margin: 50px 20px;
            padding: 30px 20px;
        }

        .submission-confirmation h1 {
            font-size: 1.5rem;
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .submission-confirmation {
        animation: fadeIn 0.5s ease-out forwards;
    }
</style>

<section class="submission-confirmation">

    <p>I appreciate it and will get back to you shortly.</p>
    <button onclick="window.location.href='/landing'" class="home-button">Return Home</button>
</section>
{% endblock %}
