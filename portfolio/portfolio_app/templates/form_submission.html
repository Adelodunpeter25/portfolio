
{% block form_submission %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Submission - My Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #000000;
            background-color: #e9e9e9;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .submission-confirmation {
            max-width: 500px;
            max-height: fit-content;
            margin: 150px auto;
            padding: 40px;
            background-color: #15151500;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(7, 49, 141, 0.951);
            text-align: center;
            transition: all 0.3s ease;
        }

        .submission-confirmation h1 {
            font-size: 2.1rem;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .submission-confirmation p {
            font-size: 1.2rem;
            color: #2f2f2f;
            margin-bottom: 30px;
        }

        .submission-confirmation button {
            display: inline-block;
            background-color: #000000;
            color: white;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
            border: none;
        }

    .submission-confirmation button:hover{
          background-color: #2239ce

    }
        @media (prefers-color-scheme: light) {
            body {
                background-color: #ffffff;
            }

            .submission-confirmation {
                background-color: #000000;
                color: #f3f4f6;
                box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
            }

            .submission-confirmation h1 {
                color: #150995;
            }

            .submission-confirmation p {
                color: #fdfeff;
            }
        }

        @media (max-width: 770px) {
            .submission-confirmation {
                margin: 50px 20px;
                padding: 30px 20px;
            }

            .submission-confirmation h1 {
                font-size: 1.5rem;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submission-confirmation {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="submission-confirmation">
        <img src="https://imgs.search.brave.com/aaoLv1ZzCwGUngYzUUFwq5LS-8oUEPR1i_sBEDhZEiM/rs:fit:0:180:1:0/g:ce/aHR0cHM6Ly9jZG4u/aWNvbnNjb3V0LmNv/bS9pY29uL3ByZW1p/dW0vcG5nLTI1Ni10/aHVtYi9jb25maXJt/LWljb24tZG93bmxv/YWQtaW4tc3ZnLXBu/Zy1naWYtZmlsZS1m/b3JtYXRzLS1hY2Nl/cHQtdmVyaWZ5LWJ1/c2luZXNzLXZvbC0y/LXBhY2staWNvbnMt/ODg4MzQxLnBuZz9m/PXdlYnAmdz0xMjg" />
        <h1>Thank you for your message!</h1>
        <p>I appreciate it and will get back to you shortly.</p>
        <button onclick="window.location.href='/landing'" class="home-button">Return Home</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (performance.navigation.type === 1) {
                console.log('Reload detected - suggesting return to form');
            }

        });
    </script>
</body>
</html>

{% endblock %}
