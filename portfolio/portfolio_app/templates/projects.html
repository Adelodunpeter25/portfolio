<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #1a4ebc;
      --text-color: #1f2937;
      --light-color: #f9fafb;
      --dark-color: #111827;
      --transition: all 0.3s ease;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--light-color);
      color: var(--text-color);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    section {
      padding: 80px 0;
    }

    .section-title {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-title h2 {
      font-size: 2.5rem;
      color: var(--dark-color);
      margin-bottom: 15px;
      position: relative;
      display: inline-block;
    }

    .section-title h2::after {
      content: '';
      position: absolute;
      width: 50%;
      height: 3px;
      background-color: var(--primary-color);
      bottom: -10px;
      left: 25%;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }

    .project-card {
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: var(--transition);
    }

    .project-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }

    .project-image {
      height: 250px;
      overflow: hidden;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .project-card:hover .project-image img {
      transform: scale(1.1);
    }

    .project-content {
      padding: 25px;
    }

    .project-content h3 {
      margin-bottom: 15px;
      color: var(--dark-color);
    }

    .project-content p {
      margin-bottom: 20px;
      color: var(--text-color);
    }

    .project-links {
      display: flex;
      gap: 15px;
    }

    .project-links a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      color: var(--primary-color);
      transition: var(--transition);
      text-decoration: none;
    }

    .project-links a:hover {
      color: var(--dark-color);
    }

    .project-links i {
      font-size: 0.9rem;
    }

    @media (max-width: 576px) {
      section {
        padding: 60px 0;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- Projects Section -->
  <section id="projects" class="projects">
    <div class="container">
      <div class="section-title">
        <h2>My Projects</h2>
      </div>
      <div class="projects-grid">
        <!-- Project 1 -->
        <div class="project-card">
          <div class="project-image">
            <img
              src="https://storage.googleapis.com/workspace-0f70711f-8b4e-4d94-86f1-2a93ccde5887/image/32780242-8942-4d0b-8f98-b99a2597144a.png"
              alt="E-commerce dashboard" onerror="this.src='https://placehold.co/600x400'" />
          </div>
          <div class="project-content">
            <h3>E-Commerce Platform</h3>
            <p>A full-featured online store with cart functionality, product filtering and many other features.</p>
            <div class="project-links">
              <a href="#"><i class="fas fa-external-link-alt"></i> Live Demo</a>
              <a href="#"><i class="fab fa-github"></i> Code</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
    </div>
  </section>
</body>

</html>
